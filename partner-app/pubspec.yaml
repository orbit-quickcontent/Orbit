name: orbit_partner
description: "ORBIT Partner — Production Flutter WebView wrapper for the Orbit partner web app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management & DI ────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Networking & WebSockets ──────────────────────────────────────────────────
  dio: ^5.5.0
  socket_io_client: ^3.1.2

  # ── Navigation & Routing ─────────────────────────────────────────────────────
  go_router: ^14.2.1

  # ── Persistence & Local Storage ──────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.5
  hive_flutter: ^1.1.0

  # ── Native Features ──────────────────────────────────────────────────────────
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  connectivity_plus: ^6.1.3
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # ── UI/UX Helpers & Splash ───────────────────────────────────────────────────
  flutter_native_splash: ^2.4.3
  package_info_plus: ^8.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/splash/
    - assets/icon/
