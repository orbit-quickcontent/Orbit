name: Flutter checks

on:
  push:
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - client_app
          - partner_app
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'

      - run: flutter pub get
      - run: flutter analyze
