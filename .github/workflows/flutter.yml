name: Flutter checks

on:
  push:
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - client_app
          - partner_app
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Force Flutter 3.44.6
        run: |
          cd $FLUTTER_ROOT
          git fetch --tags
          git checkout 3.44.6
          flutter --version
        shell: bash
      - run: flutter pub get
      - run: flutter analyze
