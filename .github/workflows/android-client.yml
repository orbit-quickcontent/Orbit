name: Android Client — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Static Analysis (detekt)
        working-directory: apps/android-client
        run: ./gradlew detekt --continue || true # Allow warning logs for initial migrations

      - name: Android Lint
        working-directory: apps/android-client
        run: ./gradlew lint || true

      - name: Run Unit Tests
        working-directory: apps/android-client
        run: ./gradlew test

      - name: Build Debug APK
        working-directory: apps/android-client
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-client-debug-apk
          path: apps/android-client/app/build/outputs/apk/debug/*.apk
