version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    restart: always
    expose:
      - "6379"
    networks:
      - orbit-network

  backend-api:
    build:
      context: ./apps/backend-api
      dockerfile: Dockerfile
    container_name: orbit-backend-api
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - WS_HOST=websocket-node:3003
    expose:
      - "5000"
    depends_on:
      - redis
    networks:
      - orbit-network

  websocket-node:
    build:
      context: ./apps/websocket-node
      dockerfile: Dockerfile
    container_name: orbit-websocket-node
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3003
    expose:
      - "3003"
    depends_on:
      - redis
    networks:
      - orbit-network

  web-client:
    build:
      context: ./apps/web-client
      dockerfile: Dockerfile
    container_name: orbit-web-client
    restart: always
    expose:
      - "3000"
    networks:
      - orbit-network

  web-editor:
    build:
      context: ./apps/web-editor
      dockerfile: Dockerfile
    container_name: orbit-web-editor
    restart: always
    expose:
      - "3001"
    networks:
      - orbit-network

  nginx:
    image: nginx:1.25-alpine
    container_name: orbit-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend-api
      - websocket-node
      - web-client
      - web-editor
    networks:
      - orbit-network

networks:
  orbit-network:
    driver: bridge
